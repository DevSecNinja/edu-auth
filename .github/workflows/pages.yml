---
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pages:
    uses: DevSecNinja/.github/.github/workflows/pages.yml@27fd66740c629ea38380dcd3bf93e7bc74c54247 # v1.9.0
    permissions:
      contents: read
      pages: write
      id-token: write
      # Required by the reusable workflow's Cloudflare jobs at validation time,
      # even though they are skipped here (cloudflare-preview: false).
      deployments: write
      issues: write
      pull-requests: write
    with:
      # Static site: no install/build/test steps and no Cloudflare previews.
      # Publish only the public/ directory, not the whole repo root.
      artifact-path: "public"
      install-command: ""
      cloudflare-preview: false
