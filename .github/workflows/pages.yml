---
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pages:
    uses: DevSecNinja/.github/.github/workflows/pages.yml@27fd66740c629ea38380dcd3bf93e7bc74c54247 # v1.9.0
    permissions:
      contents: read
      pages: write
      id-token: write
    with:
      # Static site: no install/build/test steps and no Cloudflare previews.
      install-command: ""
      cloudflare-preview: false
